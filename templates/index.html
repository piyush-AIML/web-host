<!doctype html>
<html>
  <head>
    <title>Cat vs Dog Classifier</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* =======================
       THEME VARIABLES
    ======================= */
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #e2e8f0;
        --subtext: #94a3b8;
        --result-bg: #f8fafc;
        --result-text: #0f172a;
      }

      .light-mode {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --subtext: #475569;
        --result-bg: #e2e8f0;
        --result-text: #0f172a;
      }

      /* =======================
       GLOBAL STYLES
    ======================= */
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Arial, sans-serif;
        transition:
          background 0.4s ease,
          color 0.4s ease;
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        transition: all 0.4s ease;
        animation: fadeIn 0.6s ease;
      }

      h2 {
        font-weight: 600;
      }

      p {
        color: var(--subtext);
      }

      /* =======================
       UPLOAD BOX
    ======================= */
      .upload-box {
        border: 2px dashed #6366f1;
        padding: 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .upload-box:hover {
        background: rgba(99, 102, 241, 0.1);
        transform: scale(1.02);
      }

      /* =======================
       BUTTON
    ======================= */
      .btn-custom {
        background: #6366f1;
        border: none;
        transition: all 0.3s ease;
      }

      .btn-custom:hover {
        background: #4f46e5;
        transform: scale(1.05);
      }

      /* =======================
       IMAGE
    ======================= */
      img {
        border-radius: 12px;
        margin-top: 15px;
        max-height: 250px;
        object-fit: cover;
        animation: fadeIn 0.5s ease;
      }

      /* =======================
       RESULT
    ======================= */
      .result-box {
        background: var(--result-bg);
        color: var(--result-text);
        padding: 18px;
        border-radius: 12px;
        margin-top: 20px;
        animation: slideUp 0.5s ease;
      }

      .prediction-text {
        font-size: 1.6rem;
        font-weight: bold;
      }

      .confidence-text {
        font-size: 1.05rem;
        color: #475569;
      }

      .progress {
        height: 12px;
        border-radius: 10px;
        margin-top: 12px;
        overflow: hidden;
      }

      .progress-bar {
        transition: width 1s ease-in-out;
      }

      /* =======================
       SPINNER
    ======================= */
      .spinner {
        display: none;
        margin-top: 15px;
      }

      /* =======================
       TOGGLE BUTTON
    ======================= */
      .theme-btn {
        position: absolute;
        top: 15px;
        right: 15px;
      }

      /* =======================
       ANIMATIONS
    ======================= */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card text-center position-relative" style="width: 420px">
        <!-- Theme Toggle -->
        <button
          onclick="toggleMode()"
          class="btn btn-outline-light btn-sm theme-btn"
        >
          🌙 / ☀️
        </button>

        <h2>🐱🐶 Classifier</h2>
        <p>Upload or drag an image</p>

        <form method="POST" enctype="multipart/form-data" id="form">
          <div class="upload-box mb-3" onclick="fileInput.click()">
            Click or Drag Image Here
            <input
              type="file"
              name="file"
              id="fileInput"
              class="d-none"
              required
            />
          </div>

          <button class="btn btn-custom w-100">Predict</button>
        </form>

        <!-- Spinner -->
        <div class="spinner" id="spinner">
          <div class="spinner-border text-light"></div>
          <p>Processing...</p>
        </div>

        <!-- Preview -->
        <img id="preview" style="display: none; width: 100%" />

        {% if prediction %}
        <div class="result-box">
          <div
            class="prediction-text"
            style="color: {{ '#16a34a' if 'Cat' in prediction else '#ea580c' }}"
          >
            {{ prediction }}
          </div>

          <div class="confidence-text">Confidence: {{ confidence }}%</div>

          <div class="progress">
            <div
              class="progress-bar bg-success"
              style="width: {{ confidence }}%"
            ></div>
          </div>
        </div>
        {% endif %}
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const preview = document.getElementById("preview");
      const form = document.getElementById("form");
      const spinner = document.getElementById("spinner");

      // Preview
      fileInput.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (file) {
          preview.src = URL.createObjectURL(file);
          preview.style.display = "block";
        }
      });

      // Spinner
      form.addEventListener("submit", function () {
        spinner.style.display = "block";
      });

      // Drag & Drop
      const uploadBox = document.querySelector(".upload-box");

      uploadBox.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadBox.style.background = "rgba(99,102,241,0.2)";
      });

      uploadBox.addEventListener("dragleave", () => {
        uploadBox.style.background = "transparent";
      });

      uploadBox.addEventListener("drop", (e) => {
        e.preventDefault();
        fileInput.files = e.dataTransfer.files;

        const file = e.dataTransfer.files[0];
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
      });

      // Theme Toggle
      function toggleMode() {
        document.body.classList.toggle("light-mode");

        if (document.body.classList.contains("light-mode")) {
          localStorage.setItem("theme", "light");
        } else {
          localStorage.setItem("theme", "dark");
        }
      }

      // Load theme
      window.onload = function () {
        const theme = localStorage.getItem("theme");
        if (theme === "light") {
          document.body.classList.add("light-mode");
        }
      };
    </script>
  </body>
</html>
